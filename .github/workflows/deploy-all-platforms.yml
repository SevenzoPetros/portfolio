name: Deploy All Platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  NODE_VERSION: '18'

jobs:
  # Web Deployment
  web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run type check
      run: npm run type-check
      
    - name: Run linting
      run: npm run lint
      
    - name: Build web application
      run: npm run build
      
    - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          
    - name: Upload web artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-build
        path: out/

  # Android Build
  android:
    runs-on: ubuntu-latest
    needs: web
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: portfolio-mobile/package-lock.json
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install mobile dependencies
      working-directory: portfolio-mobile
      run: npm ci
      
    - name: Setup Expo CLI
      uses: expo/expo-github-action@v10
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        
    - name: Build Android APK
      working-directory: portfolio-mobile
      run: eas build --platform android --non-interactive
      env:
        EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        
    - name: Upload Android artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-apk
        path: portfolio-mobile/dist/

  # iOS Build (macOS only)
  ios:
    runs-on: macos-latest
    needs: web
    if: github.event_name == 'release'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: portfolio-mobile/package-lock.json
        
    - name: Install mobile dependencies
      working-directory: portfolio-mobile
      run: npm ci
      
    - name: Setup Expo CLI
      uses: expo/expo-github-action@v10
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        
    - name: Build iOS IPA
      working-directory: portfolio-mobile
      run: eas build --platform ios --non-interactive
      env:
        EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        
    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-ipa
        path: portfolio-mobile/dist/

  # Windows Desktop Build
  windows:
    runs-on: windows-latest
    needs: web
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Electron dependencies
      run: npm install electron electron-builder --save-dev
      
    - name: Build Windows application
      run: npm run build:windows
      env:
        CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
        CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-installer
        path: dist-windows/

  # Cross-platform Testing
  test:
    runs-on: ubuntu-latest
    needs: [web, android]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test || echo "Tests not implemented yet"
      
    - name: Download web build
      uses: actions/download-artifact@v3
      with:
        name: web-build
        path: ./out
        
    - name: Test web build
      run: |
        if [ -f "./out/index.html" ]; then
          echo "Web build successful"
        else
          exit 1
        fi

  # Release Creation
  release:
    runs-on: ubuntu-latest
    needs: [web, android, windows]
    if: github.event_name == 'release'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Create Release Assets
      run: |
        mkdir -p release-assets
        cp -r web-build/* release-assets/
        cp -r android-apk/* release-assets/ 2>/dev/null || echo "No Android artifacts"
        cp -r windows-installer/* release-assets/ 2>/dev/null || echo "No Windows artifacts"
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deployment Summary
  summary:
    runs-on: ubuntu-latest
    needs: [web, android, ios, windows]
    if: always()
    steps:
    - name: Deployment Summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Web | ${{ needs.web.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android | ${{ needs.android.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| iOS | ${{ needs.ios.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Windows | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
